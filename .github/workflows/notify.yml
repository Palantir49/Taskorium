name: Telegram Notifications

on:
  pull_request:
    branches: [ "main", "dev" ]
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ "main", "dev" ]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Set message based on event
        id: message
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "title=📥 Pull Request" >> $GITHUB_OUTPUT
            echo "action=${{ github.event.action }}" >> $GITHUB_OUTPUT
            echo "branch=${{ github.head_ref }} → ${{ github.base_ref }}" >> $GITHUB_OUTPUT
          else
            echo "title=🔀 Слияние" >> $GITHUB_OUTPUT
            echo "action=merged" >> $GITHUB_OUTPUT
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Notify on Telegram
        uses: EverythingSuckz/github-telegram-notify@main
        with:
          bot_token: '${{ secrets.BOT_TOKEN }}'
          chat_id: '${{ secrets.CHAT_ID }}'
