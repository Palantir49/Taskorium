name: Publish OpenAPI

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'src/**'
      - '.github/workflows/*.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: ./src/backend
        run: dotnet restore Taskorium.slnx

      - name: Build and generate OpenAPI
        working-directory: ./src/backend
        run: dotnet build Taskorium.slnx --no-restore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install orval
        run: npm install -g orval

      - name: Prepare pages directory
        run: mkdir -p ./pages/client

      - name: Copy OpenAPI spec
        run: cp openapi/openapi.json ./pages/openapi.json

      - name: Generate TypeScript axios client
        run: |
          orval --input ./pages/openapi.json --output ./pages/client --client axios

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4