name: Taskorium CI

on:
  pull_request:
    branches: [ "main", "dev" ]
    types: [ opened, synchronize, reopened ]
    paths:
      - 'src/**'
      - '.github/workflows/*.yml'
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'src/**'
      - '.github/workflows/*.yml'

jobs:
  # ─────────────────────────────────────────────
  # Определяем какие сервисы изменились (только PR)
  # ─────────────────────────────────────────────
  check-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      task-service: ${{ steps.filter.outputs.task-service }}
      file-storage-service: ${{ steps.filter.outputs.file-storage-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            task-service:
              - 'src/backend/Services/Task/**'
              - 'src/backend/Shared/Taskorium.IntegrationEvents/**'
              - 'src/backend/Shared/Taskorium.MessageBus/**'
              - 'src/backend/Shared/Taskorium.ServiceDefaults/**'
              - 'src/backend/Shared/Taskorium.Protos/**'
            file-storage-service:
              - 'src/backend/Services/FileStorage/**'
              - 'src/backend/Shared/Taskorium.ServiceDefaults/**'
              - 'src/backend/Shared/Taskorium.Protos/**'
            notification-service:
              - 'src/backend/Services/Notification/**'
              - 'src/backend/Shared/Taskorium.ServiceDefaults/**'
              - 'src/backend/Shared/Taskorium.MessageBus/**'
              - 'src/backend/Shared/Taskorium.IntegrationEvents/**'
            frontend:
              - 'src/frontend/**'

  # ─────────────────────────────────────────────
  # Format / Build / Test — только на PR
  # ─────────────────────────────────────────────
  format-build-test-task-service:
    needs: check-changes
    if: github.event_name == 'pull_request' && needs.check-changes.outputs.task-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Show SDK info
        run: dotnet --info

      - name: Restore dependencies
        working-directory: src/backend/Services/Task/TaskService.Api
        run: dotnet restore

      - name: Format check
        working-directory: src/backend/Services/Task/TaskService.Api
        run: dotnet format --no-restore --verify-no-changes

      - name: Build
        working-directory: src/backend/Services/Task/TaskService.Api
        run: dotnet build --no-restore --configuration Release

      - name: Test
        working-directory: src/backend/Services/Task/TaskService.Tests
        run: dotnet test --configuration Release --verbosity normal

  format-build-test-file-storage-service:
    needs: check-changes
    if: github.event_name == 'pull_request' && needs.check-changes.outputs.file-storage-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Show SDK info
        run: dotnet --info

      - name: Restore dependencies
        working-directory: src/backend/Services/FileStorage/FileStorageService.API
        run: dotnet restore

      - name: Format check
        working-directory: src/backend/Services/FileStorage/FileStorageService.API
        run: dotnet format --no-restore --verify-no-changes

      - name: Build
        working-directory: src/backend/Services/FileStorage/FileStorageService.API
        run: dotnet build --no-restore --configuration Release

      - name: Test
        working-directory: src/backend/Services/FileStorage/FileStorageService.Tests
        run: dotnet test --configuration Release --verbosity normal

  format-build-test-notification-service:
    needs: check-changes
    if: github.event_name == 'pull_request' && needs.check-changes.outputs.notification-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Show SDK info
        run: dotnet --info

      - name: Restore dependencies
        working-directory: src/backend/Services/Notification/NotificationService.Api
        run: dotnet restore

      - name: Format check
        working-directory: src/backend/Services/Notification/NotificationService.Api
        run: dotnet format --no-restore --verify-no-changes

      - name: Build
        working-directory: src/backend/Services/Notification/NotificationService.Api
        run: dotnet build --no-restore --configuration Release

      - name: Test
        working-directory: src/backend/Services/Notification/NotificationService.Tests
        run: dotnet test --configuration Release --verbosity normal
  
  format-build-test-frontend:
    needs: check-changes
    if: github.event_name == 'pull_request' && needs.check-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci
      
      # - name: Lint
      #   working-directory: src/frontend
      #   run: npm run lint

      - name: Build
        working-directory: src/frontend
        run: npm run build

      - name: Test
        working-directory: src/frontend
        run: npm test -- --runInBand

  # ─────────────────────────────────────────────
  # Build & Push Docker — только на push в main
  # ─────────────────────────────────────────────
  build-and-push-task-service:
    needs: format-build-test-task-service
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.format-build-test-task-service.result == 'success' ||
       needs.format-build-test-task-service.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create appsettings.Production.json for TaskService
        run: |
          echo '${{ secrets.APPSETTINGS_TASK_SERVICE }}' > src/backend/Services/Task/TaskService.Api/appsettings.Production.json
          jq empty src/backend/Services/Task/TaskService.Api/appsettings.Production.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push TaskService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/backend/Services/Task/TaskService.Api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskorium/task-service:${{ steps.tag.outputs.value }}

  build-and-push-file-storage-service:
    needs: format-build-test-file-storage-service
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.format-build-test-file-storage-service.result == 'success' ||
       needs.format-build-test-file-storage-service.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create appsettings.Production.json for FileStorageService
        run: |
          echo '${{ secrets.APPSETTINGS_FILE_STORAGE_SERVICE }}' > src/backend/Services/FileStorage/FileStorageService.API/appsettings.Production.json
          jq empty src/backend/Services/FileStorage/FileStorageService.API/appsettings.Production.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push FileStorageService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/backend/Services/FileStorage/FileStorageService.API/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskorium/file-storage-service:${{ steps.tag.outputs.value }}

  build-and-push-notification-service:
    needs: format-build-test-notification-service
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.format-build-test-notification-service.result == 'success' ||
       needs.format-build-test-notification-service.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create appsettings.Production.json for NotificationService
        run: |
          echo '${{ secrets.APPSETTINGS_NOTIFICATION_SERVICE }}' > src/backend/Services/Notification/NotificationService.Api/appsettings.Production.json
          jq empty src/backend/Services/Notification/NotificationService.Api/appsettings.Production.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push NotificationService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/backend/Services/Notification/NotificationService.Api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskorium/notification-service:${{ steps.tag.outputs.value }}
  
  build-and-push-frontend:
    needs: format-build-test-frontend
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.format-build-test-frontend.result == 'success' ||
       needs.format-build-test-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskorium/taskorium-frontend:${{ steps.tag.outputs.value }}
          
