name: Taskorium CI

on:
  pull_request:
    branches: [ "main", "dev" ]
    types: [ opened, synchronize, reopened ]
    paths:
      - 'src/**'
      - '.github/workflows/*.yml'
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'src/**'
      - '.github/workflows/*.yml'

jobs:
  # ─── CI проверки: только для PR ───
  format-build-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Show SDK info
        run: dotnet --info

      - name: Restore dependencies
        working-directory: ./src/backend
        run: dotnet restore Taskorium.slnx

      - name: Format check
        working-directory: ./src/backend
        run: dotnet format Taskorium.slnx --no-restore --verify-no-changes

      - name: Build
        working-directory: ./src/backend
        run: dotnet build Taskorium.slnx --no-restore

      - name: Test
        working-directory: ./src/backend/Services/Task/TaskService.Tests
        run: dotnet test --no-build --verbosity normal

  # ─── Уведомление после CI (только для PR) ───
  notify-after-ci:
    if: github.event_name == 'pull_request'
    needs: format-build-test
    runs-on: ubuntu-latest
    steps:
      - name: Set message for PR
        id: pr_msg
        run: |
          echo "title=📥 Pull Request" >> $GITHUB_OUTPUT
          echo "action=${{ github.event.action }}" >> $GITHUB_OUTPUT
          echo "status=${{ needs.format-build-test.result }}" >> $GITHUB_OUTPUT

      - name: Notify after CI
        uses: EverythingSuckz/github-telegram-notify@main
        with:
          bot_token: '${{ secrets.BOT_TOKEN }}'
          chat_id: '${{ secrets.CHAT_ID }}'

  # ─── Уведомление о merge (только для push) ───
  notify-merge:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Notify merge
        uses: EverythingSuckz/github-telegram-notify@main
        with:
          bot_token: '${{ secrets.BOT_TOKEN }}'
          chat_id: '${{ secrets.CHAT_ID }}'